<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="司機登入">
<title>🚌 司機登入</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/tabler-icons.min.css">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fff;--bg2:#f6f6f6;--bg3:#eee;--text:#1a1a1a;--text2:#666;--border:#e0e0e0;--border2:#ccc;--blue:#185FA5;--blue-l:#E6F1FB;--blue-d:#0C447C;--green:#3B6D11;--green-l:#EAF3DE;--green-d:#27500A;--amber:#854F0B;--amber-l:#FAEEDA;--red:#A32D2D;--red-l:#FCEBEB;}
body{font-family:-apple-system,sans-serif;background:linear-gradient(135deg,#dbeafe,#dcfce7);min-height:100vh;display:flex;align-items:center;justify-content:center;font-size:15px}
.card{background:#fff;border-radius:16px;padding:28px 32px;width:380px;max-width:95vw;box-shadow:0 4px 32px rgba(0,0,0,.12)}
h1{font-size:22px;font-weight:700;text-align:center;margin-bottom:4px}
.sub{font-size:14px;color:var(--text2);text-align:center;margin-bottom:22px}
label{font-size:13px;color:var(--text2);display:block;margin-bottom:3px}
select,input{width:100%;padding:9px 10px;border:1px solid var(--border2);border-radius:8px;font-size:14px;height:40px;margin-bottom:12px}
.btn{width:100%;padding:12px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-green{background:var(--green);color:var(--green-l)}
.err{color:var(--red);font-size:13px;margin-bottom:8px;display:none}
.back{text-align:center;margin-top:12px;font-size:13px;color:var(--text2)}
.back a{color:var(--blue)}
</style>
</head>
<body>
<div class="card">
  <h1>🚌 司機登入</h1>
  <div class="sub">旅遊業務管理系統</div>
  <label>選擇姓名</label>
  <select id="drv-sel"></select>
  <label>密碼</label>
  <input type="password" id="drv-pwd" placeholder="輸入密碼" onkeydown="if(event.key==='Enter')doLogin()">
  <div class="err" id="err-msg"><i class="ti ti-alert-circle"></i> 密碼錯誤，請重新輸入</div>
  <button class="btn btn-green" onclick="doLogin()"><i class="ti ti-steering-wheel"></i> 登入</button>

</div>
<script>
firebase.initializeApp({apiKey:"AIzaSyAQNo3CGRWbFdGfyO2GFetJYjc4MGAc-yU",authDomain:"travel-booking-233b7.firebaseapp.com",projectId:"travel-booking-233b7",storageBucket:"travel-booking-233b7.firebasestorage.app",messagingSenderId:"1020869295331",appId:"1:1020869295331:web:deb14c36d3199a3654d9d6"});
const db=firebase.firestore();
const DRV_KEY='driverDeviceTrusted_v1';
let drivers=[];

db.collection('drivers').onSnapshot(s=>{
  drivers=s.docs.map(d=>({id:d.id,...d.data()})).filter(d=>d.type==='own');
  const sel=document.getElementById('drv-sel');
  sel.innerHTML=drivers.map(d=>`<option value="${d.id}">${d.name}</option>`).join('');

  // 若裝置已記住某位司機，自動跳轉
  const saved=localStorage.getItem(DRV_KEY);
  if(saved){
    try{
      const info=JSON.parse(saved);
      const drv=drivers.find(d=>d.id===info.id);
      if(drv){
        sessionStorage.setItem('driverLogin',JSON.stringify({id:drv.id,name:drv.name}));
        window.location.href='index.html#driver';
      }
    }catch(e){localStorage.removeItem(DRV_KEY);}
  }
});

function doLogin(){
  const id=document.getElementById('drv-sel').value,pwd=document.getElementById('drv-pwd').value;
  const drv=drivers.find(d=>d.id===id);
  if(!drv||drv.password!==pwd){document.getElementById('err-msg').style.display='block';return;}
  // 記住此裝置
  localStorage.setItem(DRV_KEY,JSON.stringify({id,name:drv.name}));
  sessionStorage.setItem('driverLogin',JSON.stringify({id,name:drv.name}));
  window.location.href='index.html#driver';
}
</script>
</body>
</html>
