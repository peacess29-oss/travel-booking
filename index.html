<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="旅遊管理">
<title>旅遊業務管理系統</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/tabler-icons.min.css">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fff;--bg2:#f6f6f6;--bg3:#eee;--text:#1a1a1a;--text2:#666;--text3:#999;--border:#e0e0e0;--border2:#ccc;--blue:#185FA5;--blue-l:#E6F1FB;--blue-d:#0C447C;--green:#3B6D11;--green-l:#EAF3DE;--green-d:#27500A;--amber:#854F0B;--amber-l:#FAEEDA;--amber-d:#633806;--red:#A32D2D;--red-l:#FCEBEB;--red-d:#791F1F;--purple:#5b3fa0;--purple-l:#ede8f8;}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;--text:#f2f2f7;--text2:#aeaeb2;--text3:#636366;--border:#3a3a3c;--border2:#48484a;}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg2);color:var(--text);font-size:15px;min-height:100vh}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#dbeafe,#dcfce7)}
.login-card{background:var(--bg);border-radius:16px;padding:28px 32px;width:360px;max-width:95vw;box-shadow:0 4px 32px rgba(0,0,0,.12)}
.login-title{font-size:22px;font-weight:700;text-align:center;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--text2);text-align:center;margin-bottom:22px}
.role-btn{width:100%;padding:12px 14px;border:1px solid var(--border2);border-radius:10px;font-size:13px;cursor:pointer;background:var(--bg);color:var(--text);display:flex;align-items:center;gap:10px;margin-bottom:8px;transition:all .1s;font-weight:500;text-align:left}
.role-btn:hover{background:var(--blue-l);border-color:var(--blue)}
.topbar{background:var(--bg);border-bottom:1px solid var(--border);padding:0 16px;height:48px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:60}
.topbar-brand{font-size:15px;font-weight:700;display:flex;align-items:center;gap:7px}
.sync-pill{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);padding:3px 9px;background:var(--bg2);border-radius:20px;border:1px solid var(--border)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green)}
.sync-dot.syncing{background:#EF9F27;animation:pulse 1s infinite}
.sync-dot.error{background:#e03030}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.nav{background:var(--bg);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;position:sticky;top:48px;z-index:50}
.nav::-webkit-scrollbar{display:none}
.nav-tab{padding:10px 14px;font-size:13px;cursor:pointer;border:none;background:none;color:var(--text2);border-bottom:2px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:4px;flex-shrink:0;transition:color .1s}
.nav-tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}
.nav-tab:hover:not(.active){background:var(--bg2)}
.page{display:none;max-width:1100px;margin:0 auto;padding:14px 16px 60px}
.page.active{display:block}
.card{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px}
.card-title{font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px}
label{font-size:13px;color:var(--text2);display:block;margin-bottom:3px}
input,select,textarea{width:100%;padding:9px 10px;border:1px solid var(--border2);border-radius:8px;font-size:14px;background:var(--bg);color:var(--text);height:36px}
textarea{height:auto;resize:vertical}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 2px rgba(24,95,165,.08)}
.btn{padding:8px 14px;border:1px solid var(--border2);border-radius:8px;font-size:13px;cursor:pointer;background:var(--bg);color:var(--text);display:inline-flex;align-items:center;gap:4px;transition:all .1s;white-space:nowrap;font-weight:500}
.btn:hover{background:var(--bg2)}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--blue);color:#E6F1FB;border-color:var(--blue)}
.btn-primary:hover{background:var(--blue-d)}
.btn-sm{padding:4px 9px;font-size:12px}
.btn-success{background:var(--green);color:var(--green-l);border-color:var(--green)}
.btn-success:hover{background:var(--green-d)}
.btn-warn{background:var(--amber);color:var(--amber-l);border-color:var(--amber)}
.btn-danger{color:var(--red);border-color:#F09595}.badge-red{background:var(--red-l);color:var(--red-d)}.badge-blue{background:var(--blue-l);color:var(--blue-d)}.badge-green{background:var(--green-l);color:var(--green-d)}.badge-amber{background:var(--amber-l);color:var(--amber-d)}
.btn-danger:hover{background:var(--red-l)}
.badge{display:inline-flex;align-items:center;gap:2px;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.fg{display:flex;gap:10px;margin-bottom:10px}
.fg>div{flex:1;min-width:0}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px}
.mb10{margin-bottom:10px}
.divider{height:1px;background:var(--border);margin:12px 0}
.stat-row{display:grid;gap:8px;margin-bottom:12px}
.stat-card{background:var(--bg2);border-radius:8px;padding:10px 12px;border:1px solid var(--border)}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:2px}
.stat-val{font-size:18px;font-weight:700}
.tbl-wrap{overflow-x:auto;border-radius:8px;border:1px solid var(--border)}
.xtable{width:100%;border-collapse:collapse;font-size:13px}
.xtable th{background:var(--bg2);padding:8px 10px;text-align:left;font-weight:600;color:var(--text2);border:1px solid var(--border);white-space:nowrap}
.xtable td{padding:7px 10px;border:1px solid var(--border);vertical-align:middle}
.xtable tbody tr:hover td{background:rgba(0,0,0,.02)}
.xtable tfoot td{background:var(--bg2);font-weight:600}
.xtable .chk{text-align:center;cursor:pointer;user-select:none;font-size:15px}
.xtable .chk:hover{background:var(--bg3)!important}
.cal-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dow{text-align:center;font-size:11px;font-weight:600;color:var(--text2);padding:4px;background:var(--bg2);border-radius:4px}
.cal-cell{min-height:74px;border:1px solid var(--border);border-radius:6px;padding:3px;background:var(--bg);cursor:pointer;transition:border-color .1s}
.cal-cell:hover{border-color:var(--blue)}
.cal-cell.today{border:2px solid var(--blue)}
.cal-cell.holiday{background:#fff8f8}
.cal-cell.holiday .cal-date{color:var(--red)}
.cal-cell.makeup .cal-date{color:var(--blue)}
.cal-cell.other-month{opacity:.4;background:var(--bg2)}
.cal-date{font-size:11px;font-weight:600;margin-bottom:2px}
.cal-pill{font-size:10px;padding:1px 4px;border-radius:3px;margin-bottom:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cal-pill.own{background:var(--green-l);color:var(--green-d)}
.cal-pill.out{background:var(--amber-l);color:var(--amber-d)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:var(--bg);border-radius:12px;padding:20px;width:560px;max-width:100%;margin:auto;box-shadow:0 8px 40px rgba(0,0,0,.18)}
.modal-lg{width:660px}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.mh-title{font-size:15px;font-weight:700}
.mf{display:flex;justify-content:space-between;align-items:center;margin-top:16px}
.empty{text-align:center;padding:2.5rem;color:var(--text2)}
.info-box{background:var(--blue-l);border:1px solid #B5D4F4;border-radius:8px;padding:10px 12px;font-size:12px;color:var(--blue-d);margin-bottom:10px}
.warn-box{background:var(--amber-l);border:1px solid #FAC775;border-radius:8px;padding:10px 12px;font-size:12px;color:var(--amber-d);margin-bottom:10px}
.ok-box{background:var(--green-l);border:1px solid #97C459;border-radius:8px;padding:10px 12px;font-size:12px;color:var(--green-d);margin-bottom:10px}
.err-box{background:var(--red-l);border:1px solid #F09595;border-radius:8px;padding:10px 12px;font-size:12px;color:var(--red-d);margin-bottom:10px}
.pbar-wrap{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.pbar{height:100%;border-radius:2px;transition:width .3s}
.tag-hol{font-size:10px;color:var(--red);background:var(--red-l);padding:1px 4px;border-radius:3px}
.tag-mkp{font-size:10px;color:var(--blue);background:var(--blue-l);padding:1px 4px;border-radius:3px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bar-label{width:80px;font-size:12px;color:var(--text2);text-align:right;flex-shrink:0}
.bar-wrap{flex:1;height:20px;background:var(--bg3);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .4s}
.bar-val{width:80px;font-size:12px;font-weight:600;flex-shrink:0}
.mo-chart{display:flex;align-items:flex-end;gap:3px;height:120px;padding:0 4px;border-bottom:1px solid var(--border);margin-bottom:6px}
.mo-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.mo-bar{width:100%;border-radius:3px 3px 0 0}
.mo-bar-lbl{font-size:10px;color:var(--text2);text-align:center}
.summary-profit{border-radius:10px;padding:14px;margin-bottom:12px;background:linear-gradient(135deg,var(--green-l),#f0fbe0);border:1px solid #97C459}
.summary-loss{border-radius:10px;padding:14px;margin-bottom:12px;background:linear-gradient(135deg,var(--red-l),#fff0f0);border:1px solid #F09595}
/* 公開報名頁 */
.pub-wrap{min-height:100vh;background:linear-gradient(135deg,#dbeafe,#dcfce7);display:flex;align-items:flex-start;justify-content:center;padding:24px 16px}
.pub-card{background:var(--bg);border-radius:16px;padding:28px;width:460px;max-width:100%;box-shadow:0 4px 24px rgba(0,0,0,.1)}
.pub-title{font-size:20px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.pub-sub{font-size:13px;color:var(--text2);margin-bottom:22px}
</style>
</head>
<body>
<!-- ═══ LOGIN ═══ -->
<div id="login-screen" class="login-wrap">
  <div class="login-card">
    <div class="login-title">🚌 旅遊業務管理</div>
    <div class="login-sub">請選擇身份登入</div>
    <button class="role-btn" onclick="adminLogin()">
      <i class="ti ti-shield-lock" style="font-size:22px;color:var(--blue)"></i>
      <div><div>業務管理員</div><div style="font-size:11px;color:var(--text2)">完整管理功能</div></div>
    </button>
    <!-- 管理員密碼輸入區（預設隱藏） -->
    <div id="admin-pwd-wrap" style="display:none;margin-top:-4px;margin-bottom:8px">
      <input type="password" id="admin-pwd-input" placeholder="請輸入管理員密碼" style="margin-bottom:6px;height:36px" onkeydown="if(event.key==='Enter')adminPwdConfirm()">
      <div id="admin-pwd-err" style="color:var(--red);font-size:12px;margin-bottom:6px;display:none"><i class="ti ti-alert-circle"></i> 密碼錯誤，請重新輸入</div>
      <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="adminPwdConfirm()"><i class="ti ti-login"></i> 確認登入</button>
    </div>
    <div style="border-top:1px solid var(--border);margin:12px 0;padding-top:12px">
      <div class="mb10"><label>司機登入</label><select id="login-drv-sel" style="height:36px"></select></div>
      <div class="mb10"><label>密碼</label><input type="password" id="login-pwd" placeholder="請輸入密碼" onkeydown="if(event.key==='Enter')loginDriver()"></div>
      <div id="login-err" style="color:var(--red);font-size:12px;margin-bottom:6px;display:none"><i class="ti ti-alert-circle"></i> 密碼錯誤</div>
      <button class="btn btn-success" style="width:100%;justify-content:center" onclick="loginDriver()"><i class="ti ti-steering-wheel"></i> 司機登入</button>
      <div style="text-align:center;margin-top:8px;font-size:12px;color:var(--text2)">司機可使用 <a href="driver.html" style="color:var(--blue)">專屬司機頁面</a> 登入（獨立網址）</div>
    </div>
  </div>
</div>

<!-- ═══ PUBLIC BOOKING PAGE ═══ -->
<div id="pub-screen" style="display:none" class="pub-wrap">
  <div class="pub-card">
    <div class="pub-title"><i class="ti ti-map" style="color:var(--blue)"></i> 旅遊報名</div>
    <div class="pub-sub">請填寫以下資料，業務人員會與您確認</div>
    <div class="mb10"><label>選擇行程 *</label><select id="pub-tour" style="height:36px"></select></div>
    <div class="mb10"><label>姓名 *</label><input id="pub-name" placeholder="請輸入姓名"></div>
    <div class="fg2">
      <div><label>報名人數 *</label><input id="pub-cnt" type="number" value="1" min="1"></div>
      <div><label>出發日期 *</label><input id="pub-date" type="date"></div>
    </div>
    <div class="fg2">
      <div><label>聯絡方式</label><select id="pub-ch"><option>WhatsApp</option><option>LINE官方</option><option>LINE個人</option><option>FB</option><option>微信</option></select></div>
      <div><label>電話（選填）</label><input id="pub-phone" placeholder="0912345678"></div>
    </div>
    <div class="mb10"><label>備註（選填）</label><input id="pub-note" placeholder="特殊需求…"></div>
    <div id="pub-result" style="display:none;padding:12px;border-radius:8px;font-size:13px;background:var(--green-l);color:var(--green-d);margin-bottom:12px"></div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;padding:11px;font-size:14px" onclick="submitPub()"><i class="ti ti-send"></i> 送出報名</button>
  </div>
</div>

<!-- ═══ MAIN APP ═══ -->
<div id="app" style="display:none">
  <div class="topbar">
    <div class="topbar-brand" id="app-brand"><i class="ti ti-bus" style="color:var(--blue)"></i><span id="app-title">旅遊業務管理系統</span></div>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="sync-pill"><div class="sync-dot syncing" id="sync-dot"></div><span id="sync-msg">連線中</span></div>
      <button class="btn btn-sm" onclick="logout()"><i class="ti ti-logout"></i> 登出</button>
    </div>
  </div>
  <div class="nav" id="main-nav"></div>
  <div id="p-group" class="page active"></div>
  <div id="p-private" class="page"></div>
  <div id="p-dispatch" class="page"></div>
  <div id="p-finance" class="page"></div>
  <div id="p-balance" class="page"></div>
  <div id="p-driver" class="page"></div>
  <div id="p-settings" class="page"></div>
</div>

<!-- ═══ MODALS ═══ -->
<!-- 拼團行程 -->
<div class="overlay" id="m-tour"><div class="modal">
  <div class="mh"><span class="mh-title" id="mt-title">新增拼團行程</span><button class="btn btn-sm" onclick="cm('tour')"><i class="ti ti-x"></i></button></div>
  <div class="mb10"><label>行程名稱 *</label><input id="tf-name" placeholder="合歡山一日遊"></div>
  <div class="fg2"><div><label>平日定金</label><input id="tf-dep-wd" type="number" placeholder="500"></div><div><label>假日定金</label><input id="tf-dep-wk" type="number" placeholder="600"></div></div>
  <div class="fg2"><div><label>平日全額</label><input id="tf-pr-wd" type="number" placeholder="1200"></div><div><label>假日全額</label><input id="tf-pr-wk" type="number" placeholder="1500"></div></div>
  <div class="fg3"><div><label>幾日遊</label><input id="tf-days" type="number" value="1" min="1" placeholder="1"></div><div><label>最少成團人數</label><input id="tf-min" type="number" value="4"></div><div><label>每車上限</label><input id="tf-bus" type="number" value="8"></div></div>
  <div class="fg2"><div><label>需投旅遊險</label><select id="tf-ins"><option value="1">是</option><option value="0">否</option></select></div><div><label>旅遊險/人（元）</label><input id="tf-insp" type="number" placeholder="100"></div></div>
  <div class="mb10"><label>說明</label><textarea id="tf-desc" style="height:48px" placeholder="行程特色…"></textarea></div>
  <div class="mf"><button class="btn btn-danger btn-sm" id="btn-del-tour" style="display:none" onclick="delTour()"><i class="ti ti-trash"></i></button><div style="display:flex;gap:8px;margin-left:auto"><button class="btn" onclick="cm('tour')">取消</button><button class="btn btn-primary" onclick="saveTour()">儲存</button></div></div>
</div></div>

<!-- 報名 -->
<div class="overlay" id="m-book"><div class="modal">
  <div class="mh"><span class="mh-title" id="mb-title">新增報名</span><button class="btn btn-sm" onclick="cm('book')"><i class="ti ti-x"></i></button></div>
  <div id="mb-info" class="info-box" style="font-size:12px"></div>
  <div class="mb10"><label>姓名 *</label><input id="bf-name" placeholder="王小明"></div>
  <div class="fg2"><div><label>人數 *</label><input id="bf-cnt" type="number" value="1" min="1"></div><div><label>報名日期</label><input id="bf-reg" type="date"></div></div>
  <div class="fg2"><div><label>聯絡方式</label><select id="bf-ch"><option>WhatsApp</option><option>LINE官方</option><option>LINE個人</option><option>FB</option><option>微信</option></select></div><div><label>電話</label><input id="bf-phone" placeholder="0912345678"></div></div>
  <div class="fg2"><div><label>出發日期 *</label><input id="bf-date" type="date" onchange="updateBkPrice()"></div><div><label>帳號</label><input id="bf-contact" placeholder="LINE ID"></div></div>
  <div id="bf-price-info" style="font-size:12px;color:var(--text2);margin-bottom:8px"></div>
  <div class="mb10"><label>備註</label><input id="bf-note" placeholder="特殊需求"></div>
  <div style="display:flex;gap:20px;margin-bottom:10px">
    <label style="display:flex;align-items:center;gap:5px;cursor:pointer"><input type="checkbox" id="bf-dep" style="width:14px;height:14px"> 已付定金</label>
    <label style="display:flex;align-items:center;gap:5px;cursor:pointer"><input type="checkbox" id="bf-ins" style="width:14px;height:14px"> 已投旅遊險</label>
  </div>
  <div class="mf"><button class="btn btn-danger btn-sm" id="btn-del-book" style="display:none" onclick="delBook()"><i class="ti ti-trash"></i></button><div style="display:flex;gap:8px;margin-left:auto"><button class="btn" onclick="cm('book')">取消</button><button class="btn btn-primary" onclick="saveBook()">儲存</button></div></div>
</div></div>

<!-- 包車團 -->
<div class="overlay" id="m-priv"><div class="modal modal-lg">
  <div class="mh"><span class="mh-title" id="mp-title">新增包車團</span><button class="btn btn-sm" onclick="cm('priv')"><i class="ti ti-x"></i></button></div>
  <div class="fg2"><div><label>團名 *</label><input id="pf-name" placeholder="王先生一家"></div><div><label>類型</label><select id="pf-type" onchange="togglePriv()"><option value="car+hotel">車＋住宿</option><option value="car">純包車</option></select></div></div>
  <div class="fg3"><div><label>出發日 *</label><input id="pf-start" type="date" onchange="calcPrivDays()"></div><div><label>結束日 *</label><input id="pf-end" type="date" onchange="calcPrivDays()"></div><div><label>天數</label><input id="pf-days" readonly style="background:var(--bg2)"></div></div>
  <div class="fg3"><div><label>人數</label><input id="pf-pax" type="number" value="1" min="1"></div><div><label>車輛數</label><input id="pf-cars" type="number" value="1" min="1"></div><div><label>外派司機</label><select id="pf-out" onchange="togglePriv()"><option value="0">否（自家）</option><option value="1">是（外派）</option></select></div></div>
  <div class="fg2"><div><label>總報價（元）</label><input id="pf-price" type="number" placeholder="20000"></div><div><label>定金（元）</label><input id="pf-dep" type="number" placeholder="5000"></div></div>

<script>
// ══════════════════ FIREBASE ══════════════════
firebase.initializeApp({apiKey:"AIzaSyAQNo3CGRWbFdGfyO2GFetJYjc4MGAc-yU",authDomain:"travel-booking-233b7.firebaseapp.com",projectId:"travel-booking-233b7",storageBucket:"travel-booking-233b7.firebasestorage.app",messagingSenderId:"1020869295331",appId:"1:1020869295331:web:deb14c36d3199a3654d9d6"});
const db=firebase.firestore();

// ══════════════════ STATE ══════════════════
let tours=[],bookings=[],privates=[],dispatches=[],drivers=[],hotels=[],expenses=[],driverRecs=[],fixedExpenses=[],groupStatus={},carsList=['5201','RFT-2692','9713','8680'],costSettings={driverDayRate:5000,driverNightRate:1000};
let curPage='p-group',curRole='',curDriverId='',eIds={};
let calYear=new Date().getFullYear(),calMonth=new Date().getMonth();
let finYear=new Date().getFullYear(),finMonth=new Date().getMonth();
let hotelRooms={r2:0,r3:0,r4:0};

// ══════════════════ TAIWAN HOLIDAYS ══════════════════
const TW_HOL=new Set(['2025-01-01','2025-01-27','2025-01-28','2025-01-29','2025-01-30','2025-01-31','2025-02-28','2025-04-03','2025-04-04','2025-04-05','2025-05-01','2025-05-31','2025-06-01','2025-09-07','2025-10-10','2025-10-11','2026-01-01','2026-02-16','2026-02-17','2026-02-18','2026-02-19','2026-02-20','2026-02-28','2026-04-04','2026-04-05','2026-05-01','2026-06-19','2026-06-20','2026-09-25','2026-09-26','2026-10-10']);
const TW_MKP=new Set(['2025-01-23','2025-04-02']);
function isHol(d){const w=new Date(d).getDay();if(TW_HOL.has(d))return true;if(TW_MKP.has(d))return false;return w===0||w===6;}
function isMkp(d){return TW_MKP.has(d);}
function getPrice(t,d,f){const h=isHol(d);if(f==='deposit')return h?(t.depositWk||t.deposit||0):(t.depositWd||t.deposit||0);return h?(t.priceWk||t.price||0):(t.priceWd||t.price||0);}

// ══════════════════ UTILS ══════════════════
function setSS(s,m){document.getElementById('sync-dot').className='sync-dot'+(s==='syncing'?' syncing':s==='error'?' error':'');document.getElementById('sync-msg').textContent=m;}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function om(n){document.getElementById('m-'+n).classList.add('open')}
function cm(n){document.getElementById('m-'+n).classList.remove('open')}
document.querySelectorAll('.overlay').forEach(el=>el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open')}));
const WD=['日','一','二','三','四','五','六'];
const MONTHS=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const CH_CLS={'LINE官方':'badge-green','LINE個人':'badge-green','FB':'badge-blue','WhatsApp':'badge-green','微信':'badge-amber'};
function chBadge(ch){return`<span class="badge ${CH_CLS[ch]||'badge-blue'}">${ch||'-'}</span>`;}
function calcDays(s,e){if(!s||!e)return 0;return Math.max(0,Math.round((new Date(e)-new Date(s))/86400000)+1);}
function dateRange(s,e){const ds=[];let d=new Date(s),end=new Date(e);while(d<=end){ds.push(d.toISOString().slice(0,10));d.setDate(d.getDate()+1);}return ds;}
function isInDisp(date,d){return date>=d.start&&date<=d.end;}
function tslot(date,d){if(date===d.start&&d.startTime==='pm')return'pm';if(date===d.end&&d.endTime==='am')return'am';return'full';}
function getBks(tid){return bookings.filter(b=>b.tourId===tid);}
function getDateBks(tid,dt){return bookings.filter(b=>b.tourId===tid&&b.date===dt);}
function getDates(tid){return[...new Set(getBks(tid).map(b=>b.date))].sort();}
function buildBuses(bks,max){const rows=[];bks.forEach(b=>{for(let i=0;i<b.count;i++)rows.push({...b})});const buses=[];let cur=[];rows.forEach(r=>{if(cur.length>=max){buses.push([...cur]);cur=[];}cur.push(r);});if(cur.length)buses.push(cur);return buses;}
function isFormed(t,d){const buses=buildBuses(getDateBks(t.id,d),t.busMax||8);return buses.length>0&&buses.every(b=>b.length>=(t.min||4));}
function inMonth(d,y,m){if(!d)return false;return d.startsWith(y+'-'+String(m+1).padStart(2,'0'));}
function inYear(d,y){if(!d)return false;return d.startsWith(y+'-');}
function getPrivStatus(p){
   const today=new Date().toISOString().slice(0,10);
   if(p.end<today) return {label:'已完成',cls:'badge-green',done:true};
   if(!p.assignedDriver) return {label:'待派車',cls:'badge-red',done:false};
   if(p.start<=today&&today<=p.end) return {label:'出團中',cls:'badge-amber',done:false};
   return {label:'已派車 '+p.assignedDriver,cls:'badge-blue',done:false};
}
// ══════════════════ LISTENERS ══════════════════
function initListeners(){
  setSS('syncing','連線中');
  db.collection('tours').onSnapshot(s=>{tours=s.docs.map(d=>({id:d.id,...d.data()}));refresh();setSS('ok','已同步 ✓')},()=>setSS('error','連線失敗'));
  db.collection('bookings').onSnapshot(s=>{bookings=s.docs.map(d=>({id:d.id,...d.data()}));refresh();});
  db.collection('privates').onSnapshot(s=>{privates=s.docs.map(d=>({id:d.id,...d.data()}));refresh();});
  db.collection('dispatches').onSnapshot(s=>{dispatches=s.docs.map(d=>({id:d.id,...d.data()}));refresh();});
  db.collection('drivers').onSnapshot(s=>{drivers=s.docs.map(d=>({id:d.id,...d.data()}));populateLoginSel();refresh();});
  db.collection('hotels').onSnapshot(s=>{hotels=s.docs.map(d=>({id:d.id,...d.data()}));refresh();});
  db.collection('expenses').onSnapshot(s=>{expenses=s.docs.map(d=>({id:d.id,...d.data()}));refresh();});
  db.collection('driverRecs').onSnapshot(s=>{driverRecs=s.docs.map(d=>({id:d.id,...d.data()}));refresh();});
  db.collection('fixedExpenses').onSnapshot(s=>{fixedExpenses=s.docs.map(d=>({id:d.id,...d.data()}));refresh();});
  db.collection('meta').doc('groupStatus').onSnapshot(s=>{groupStatus=s.exists?s.data():{};refresh();});
  db.collection('meta').doc('cars').onSnapshot(s=>{if(s.exists&&s.data().list)carsList=s.data().list;refresh();});
  db.collection('meta').doc('costSettings').onSnapshot(s=>{if(s.exists)costSettings={...costSettings,...s.data()};});
}

function loginAs(role){

  document.getElementById('app-title').textContent='旅遊業務管理系統';

function checkUrgentDispatch(){
  const today=new Date().toISOString().slice(0,10);
  const soon=new Date();soon.setDate(soon.getDate()+5);
  const soonStr=soon.toISOString().slice(0,10);
  const allOrders=getAllOrders();
  const urgent=allOrders.filter(o=>o.start>=today&&o.start<=soonStr&&o.status==='待派車');
  if(urgent.length){
    const msg=urgent.map(o=>`• ${o.start} ${o.label}（${o.pax}人）`).join('\n');
    if(confirm(`⚠️ 5天內有 ${urgent.length} 筆訂單尚未派車：\n\n${msg}\n\n要前往派車總表處理嗎？`)){
      showPage('p-dispatch');
      document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
      document.querySelectorAll('.nav-tab')[2]?.classList.add('active');
    }
  }
}
function loginDriver(){
  const drvId=document.getElementById('login-drv-sel').value;
  const pwd=document.getElementById('login-pwd').value;
  const drv=drivers.find(d=>d.id===drvId);
  if(!drv||drv.password!==pwd){document.getElementById('login-err').style.display='block';return;}
  localStorage.setItem('driverDeviceTrusted_v1',JSON.stringify({id:drvId,name:drv.name}));
  curRole='driver';curDriverId=drvId;
  document.getElementById('login-err').style.display='none';
  document.getElementById('login-screen').style.display='none';

  document.getElementById('app-title').textContent=drv.name+' — 司機頁面';
  buildNav('driver');
  initListeners();
  showPage('p-driver');
}
function logout(){
  const wasRole=curRole;
  curRole='';curDriverId='';
  // 清除裝置記憶
  if(wasRole==='admin')localStorage.removeItem('adminDeviceTrusted_v1');
  if(wasRole==='driver')localStorage.removeItem('driverDeviceTrusted_v1');

  let list=privates;
  const today=new Date().toISOString().slice(0,10);
  if(fv==='pending')list=privates.filter(p=>getPrivStatus(p).label==='待派車');
  else if(fv==='assigned')list=privates.filter(p=>p.assignedDriver&&getPrivStatus(p).label.startsWith('已派車'));

  });

    dates.forEach(d=>{
      const bks=getDateBks(t.id,d);
      const total=bks.reduce((s,b)=>s+b.count,0);
      if(!total)return;
      const formed=isFormed(t,d);

      const tdays=t.days||1;
      let endDate=d;
      if(tdays>1){const ed=new Date(d);ed.setDate(ed.getDate()+tdays-1);endDate=ed.toISOString().slice(0,10);}

      const statusLabel=disp?('已派車 '+(disp.driverName||'')):'待派車';
      grpOrders.push({id:t.id+'_'+d,type:'group',source:{tour:t,date:d,bks,disp},label:t.name,start:d,end:endDate,days:tdays,pax:total,cars:Math.ceil(total/(t.busMax||8)),status:statusLabel,statusCls:disp?'badge-green':'badge-red',assignedDriver:disp?.driverName||''});

function assignDriverModal(orderId,type,label,start,end){
  // 智慧派車邏輯
  const today=new Date().toISOString().slice(0,10);
  const orderDates=dateRange(start,end);
  const ownDrivers=drivers.filter(d=>d.type==='own');
  let suggestions=[];
  ownDrivers.forEach(drv=>{
    const myDisps=dispatches.filter(d=>d.driverId===drv.id&&d.driverType==='own');
    const conflict=myDisps.find(d=>orderDates.some(date=>isInDisp(date,d)));
    if(!conflict){
      // 計算本月已排班天數
      const mDays=myDisps.filter(d=>{const s=new Date(d.start);return s.getFullYear()===calYear&&s.getMonth()===calMonth;}).reduce((s,d)=>s+calcDays(d.start,d.end),0);
      suggestions.push({drv,conflict:false,mDays,note:'無衝突，可排'});
    } else {
      suggestions.push({drv,conflict:true,conflictInfo:conflict,note:`衝突: ${conflict.start}~${conflict.end}`});
    }
  });
  // 排序：無衝突優先，月排班少的優先
  suggestions.sort((a,b)=>{if(a.conflict!==b.conflict)return a.conflict?1:-1;return a.mDays-b.mDays;});
  const sugHtml=suggestions.map(s=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px;background:${s.conflict?'var(--red-l)':'var(--green-l)'};border-radius:8px;margin-bottom:6px">
    <div><div style="font-weight:600">${s.drv.name}</div><div style="font-size:12px;color:var(--text2)">${s.note}${!s.conflict?' ｜ 本月已排'+s.mDays+'天':''}</div></div>
    <button class="btn btn-sm ${s.conflict?'btn-warn':'btn-success'}" onclick="quickAssign('${orderId}','${type}','${label}','${start}','${end}','${s.drv.id}','${s.drv.name}')"><i class="ti ti-check"></i> 指派${s.conflict?' (強制)':''}</button>
  </div>`).join('');
  const extDrivers=drivers.filter(d=>d.type==='external');
  const extHtml=extDrivers.length?`<div style="margin-top:10px"><div style="font-size:13px;font-weight:600;margin-bottom:6px">外派司機</div>${extDrivers.map(d=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px;background:var(--amber-l);border-radius:8px;margin-bottom:6px"><div><div style="font-weight:600">${d.name}</div><div style="font-size:12px;color:var(--text2)">${d.phone||''}${d.note?' ｜ '+d.note:''}</div></div><button class="btn btn-sm btn-warn" onclick="quickAssign('${orderId}','${type}','${label}','${start}','${end}','${d.id}','${d.name}')"><i class="ti ti-check"></i> 指派</button></div>`).join('')}</div>`:'';
  document.getElementById('assign-order-title').textContent=label+' ('+start+'~'+end+')';
  document.getElementById('assign-suggestions').innerHTML=sugHtml+extHtml;
  om('assign');
}
async function quickAssign(orderId,type,label,start,end,drvId,drvName){
  setSS('syncing','派車中…');
  if(type==='private'){
    const p=privates.find(x=>x.id===orderId);
    if(p)await db.collection('privates').doc(orderId).update({assignedDriver:drvName,dispatchStatus:'assigned'});
    // 建立派車記錄
    const drv=drivers.find(d=>d.id===drvId);
    await db.collection('dispatches').doc(uid()).set({label,start,end,startTime:'full',endTime:'full',driverType:drv?.type==='own'?'own':'out',driverId:drvId,driverName:drvName,outsourceName:'',car:'',carCount:1,note:'來自包車團：'+label});
  } else {
    // group tour
    const parts=orderId.split('_');const tourId=parts[0],date=parts.slice(1).join('_');
    const drv=drivers.find(d=>d.id===drvId);
    await db.collection('dispatches').doc(uid()).set({label,start,end:end||start,startTime:'full',endTime:'full',driverType:drv?.type==='own'?'own':'out',driverId:drvId,driverName:drvName,outsourceName:'',car:'',carCount:1,note:'來自拼團：'+label,groupTourId:tourId+'_'+date});
  }
  cm('assign');
}

function toggleDrvSel(){const isOwn=document.getElementById('df-dtype').value==='own';document.getElementById('df-own-wrap').style.display=isOwn?'block':'none';document.getElementById('df-out-wrap').style.display=isOwn?'none':'block';}
function chkConflict(){
  const drvId=document.getElementById('df-driver').value,start=document.getElementById('df-start').value,end=document.getElementById('df-end').value,el=document.getElementById('df-conflict');
  if(!drvId||!start||!end){el.innerHTML='';return;}
  const drv=drivers.find(d=>d.id===drvId);
  const conflict=dispatches.filter(d=>d.driverId===drvId&&d.id!==eIds.disp&&d.driverType==='own').find(d=>dateRange(start,end).some(date=>{if(!isInDisp(date,d))return false;const ns=date===start&&document.getElementById('df-st').value==='pm'?'pm':date===end&&document.getElementById('df-et').value==='am'?'am':'full';const es=tslot(date,d);return ns==='full'||es==='full'||ns===es;}));
  if(!conflict){el.innerHTML=`<div class="ok-box"><i class="ti ti-check"></i> 無衝突，${drv?.name||''}可排班</div>`;return;}
  const suggestions=[];
  drivers.filter(d=>d.type==='own'&&d.id!==drvId).forEach(drv=>{if(!dispatches.filter(x=>x.driverId===drv.id&&x.driverType==='own').find(x=>dateRange(start,end).some(date=>isInDisp(date,x))))suggestions.push(`改派給 <strong>${drv.name}</strong>`);});
  if(!suggestions.length)suggestions.push('所有自家司機均有排班，建議安排<strong>外派司機</strong>');
  el.innerHTML=`<div class="err-box"><i class="ti ti-alert-triangle"></i> 衝突：${drv?.name} 在 ${conflict.start}～${conflict.end} 已有排班「${conflict.label}」<div style="margin-top:6px;padding:8px;background:var(--green-l);border-radius:6px;color:var(--green-d)"><i class="ti ti-bulb"></i> 建議：${suggestions.join('；')}</div></div>`;

const EXP_CAT={salary:'司機薪資',outsource:'外派費用',hotel:'住宿成本',insurance:'旅遊險',fuel:'油錢',parking:'停車費',toll:'過路費',maint:'保養/維修',ad:'廣告行銷',misc:'其他雜支'};
const FIXED_CAT={insurance:'車輛保險',license:'牌照稅',registration:'行照費',loan:'車輛貸款',ad:'廣告行銷',other:'其他'};
function calcGI(y,m,isYear){return tours.map(t=>{const bks=bookings.filter(b=>b.tourId===t.id&&(isYear?inYear(b.date,y):inMonth(b.date,y,m)));const depPaid=bks.filter(b=>b.depositPaid).reduce((s,b)=>s+b.count*getPrice(t,b.date,'deposit'),0);const balPaid=bks.filter(b=>b.balancePaid).reduce((s,b)=>s+b.count*(getPrice(t,b.date,'price')-getPrice(t,b.date,'deposit')),0);return{name:t.name,depPaid,balPaid,collected:depPaid+balPaid,pax:bks.reduce((s,b)=>s+b.count,0),cnt:bks.length};}).filter(x=>x.collected>0||x.cnt>0);}
function calcPI(y,m,isYear){return privates.filter(p=>isYear?inYear(p.start,y):inMonth(p.start,y,m)).map(p=>({name:p.name,type:p.type,price:p.price,deposit:p.deposit,collected:(p.depositPaid?p.deposit:0)+(p.balancePaid?(p.price-p.deposit):0),cost:(p.driverCost||0)+(p.hotelCost||0)+(p.insCost||0),pax:p.pax||0}));}
function calcME(y,m,isYear){return expenses.filter(e=>isYear?inYear(e.date,y):inMonth(e.date,y,m));}
function calcDE(y,m,isYear){return driverRecs.filter(r=>r.type!=='income'&&(isYear?inYear(r.date,y):inMonth(r.date,y,m)));}
function calcFE(y,m,isYear){
  const ms=y+'-'+String(m+1).padStart(2,'0');
  return fixedExpenses.filter(fe=>{if(fe.start&&ms<fe.start)return false;if(fe.end&&ms>fe.end)return false;if(isYear){return fe.cycle==='monthly'||(fe.cycle==='yearly'&&fe.start&&fe.start.startsWith(y+'-'));}if(fe.cycle==='monthly')return true;if(fe.cycle==='yearly')return fe.start&&fe.start===ms;return false;}).map(fe=>({...fe,eff:isYear&&fe.cycle==='monthly'?fe.amount*12:fe.amount}));
}

    ${de.length?`<div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px">司機記錄支出</div><div class="tbl-wrap" style="margin-bottom:10px"><table class="xtable"><thead><tr><th>日期</th><th>司機</th><th>車輛</th><th>類別</th><th>說明</th><th style="text-align:right">金額</th></tr></thead><tbody>${de.sort((a,b)=>a.date>b.date?1:-1).map(r=>`<tr><td>${r.date}</td><td style="font-size:11px">${r.driverName||'-'}</td><td style="font-size:11px">${r.car||'-'}</td><td><span class="badge badge-amber">${{fuel:'加油',parking:'停車費',toll:'過路費',maint:'保養',inspection:'驗車',other:'其他'}[r.type]||r.type}</span></td><td style="font-size:11px;color:var(--text2)">${r.note||'-'}</td><td style="text-align:right;color:var(--red);font-weight:600">$${r.amount.toLocaleString()}</td></tr>`).join('')}</tbody><tfoot><tr><td colspan="5">司機支出小計</td><td style="text-align:right;color:var(--red)">$${tde.toLocaleString()}</td></tr></tfoot></table></div>`:''}

    ${!me.length&&!de.length&&!fe.length?'<div class="empty" style="padding:1rem">本期無支出</div>':''}
    <div style="text-align:right;font-size:14px;font-weight:700;color:var(--red)">總支出：$${te.toLocaleString()}</div>
  </div>
  ${te>0?`<div class="card"><div class="card-title"><i class="ti ti-chart-pie"></i> 支出分類</div>${(()=>{const cats={};me.forEach(e=>{const k=EXP_CAT[e.category]||e.category;cats[k]=(cats[k]||0)+e.amount;});de.forEach(r=>{const k={fuel:'油錢',parking:'停車費',toll:'過路費',maint:'保養/維修',inspection:'驗車',other:'其他'}[r.type]||r.type;cats[k]=(cats[k]||0)+r.amount;});fe.forEach(f=>{const k=FIXED_CAT[f.category]||f.category;cats[k]=(cats[k]||0)+f.eff;});const sorted=Object.entries(cats).sort((a,b)=>b[1]-a[1]),max=sorted.length?sorted[0][1]:1;const clrs=['#185FA5','#3B6D11','#854F0B','#A32D2D','#5b3fa0','#0e7490','#7c3aed','#b45309'];return sorted.map(([k,v],i)=>`<div class="bar-row"><div class="bar-label">${k}</div><div class="bar-wrap"><div class="bar-fill" style="width:${Math.round(v/max*100)}%;background:${clrs[i%8]}"></div></div><div class="bar-val" style="color:var(--red)">$${v.toLocaleString()}</div></div>`).join('');})()} </div>`:''}`;
}
function openExp(id=''){
  eIds.exp=id||null;const e=id?expenses.find(x=>x.id===id):null;
  document.getElementById('me-title').textContent=id?'編輯支出':'新增支出';document.getElementById('btn-del-exp').style.display=id?'inline-flex':'none';
  document.getElementById('ef-date').value=e?.date||new Date().toISOString().slice(0,10);document.getElementById('ef-amt').value=e?.amount||'';document.getElementById('ef-cat').value=e?.category||'misc';document.getElementById('ef-desc').value=e?.desc||'';
  const cs=document.getElementById('ef-car');cs.innerHTML='<option value="">不指定</option>'+carsList.map(c=>`<option value="${c}"${c===e?.car?' selected':''}>${c}</option>`).join('');
  const ds=document.getElementById('ef-driver');ds.innerHTML='<option value="">不指定</option>'+drivers.filter(d=>d.type==='own').map(d=>`<option value="${d.id}"${d.id===e?.driverId?' selected':''}>${d.name}</option>`).join('');
  om('exp');
}
async function saveExp(){const date=document.getElementById('ef-date').value,amount=parseInt(document.getElementById('ef-amt').value)||0;if(!date||!amount)return alert('請填寫日期與金額');setSS('syncing','儲存中…');const drvId=document.getElementById('ef-driver').value;const data={date,amount,category:document.getElementById('ef-cat').value,desc:document.getElementById('ef-desc').value.trim(),car:document.getElementById('ef-car').value,driverId:drvId,driverName:drvId?(drivers.find(d=>d.id===drvId)?.name||''):'',};if(eIds.exp)await db.collection('expenses').doc(eIds.exp).update(data);else await db.collection('expenses').doc(uid()).set(data);cm('exp');}
async function delExp(){if(!confirm('確定刪除？'))return;await db.collection('expenses').doc(eIds.exp).delete();cm('exp');}
function openFixed(id=''){
  eIds.fixed=id||null;const f=id?fixedExpenses.find(x=>x.id===id):null;
  document.getElementById('mf-title').textContent=id?'編輯固定支出':'新增固定支出';document.getElementById('btn-del-fixed').style.display=id?'inline-flex':'none';

  const cs=document.getElementById('ff-car');cs.innerHTML='<option value="">不指定</option>'+carsList.map(c=>`<option value="${c}"${c===f?.car?' selected':''}>${c}</option>`).join('');om('fixed');

async function saveFixed(){const name=document.getElementById('ff-name').value.trim(),amount=parseInt(document.getElementById('ff-amt').value)||0;if(!name||!amount)return alert('請填寫名稱與金額');setSS('syncing','儲存中…');const data={name,amount,cycle:document.getElementById('ff-cycle').value,category:document.getElementById('ff-cat').value,car:document.getElementById('ff-car').value,start:document.getElementById('ff-start').value,end:document.getElementById('ff-end').value,note:document.getElementById('ff-note').value.trim()};if(eIds.fixed)await db.collection('fixedExpenses').doc(eIds.fixed).update(data);else await db.collection('fixedExpenses').doc(uid()).set(data);cm('fixed');}

// ══════════════════ PAGE: 尾款收款 ══════════════════
let balMonth='';
function renderBalance(){
  const el=document.getElementById('p-balance');
  const selMonth=document.getElementById('bal-month')?.value||balMonth;
  const filterByMonth=(date)=>!selMonth||date.startsWith(selMonth);
  const tourItems=tours.flatMap(t=>[...new Set(getBks(t.id).map(b=>b.date))].sort().filter(d=>filterByMonth(d)).map(d=>{const bks=getDateBks(t.id,d).filter(b=>!b.balancePaid);if(!bks.length)return null;const dep=getPrice(t,d,'deposit'),pr=getPrice(t,d,'price'),bal=pr-dep;return{label:t.name+' / '+d,bks:bks.map(b=>({...b,perPax:bal})),subtotal:bks.reduce((s,b)=>s+b.count*bal,0)};}).filter(Boolean));
  const pvItems=privates.filter(p=>!p.balancePaid&&filterByMonth(p.start||'')).map(p=>({label:p.name+'（'+(p.type==='car+hotel'?'車+住宿':'純包車')+'）'+p.start,subtotal:p.price-p.deposit,id:p.id}));
  const grand=[...tourItems,...pvItems].reduce((s,x)=>s+x.subtotal,0);
  const monthSel=`<div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap"><label style="font-size:13px;font-weight:600">篩選月份：</label><input type="month" id="bal-month" value="${selMonth}" style="height:36px;font-size:13px;width:150px" onchange="balMonth=this.value;renderBalance()"><button class="btn btn-sm" onclick="balMonth='';document.getElementById('bal-month').value='';renderBalance()">全部</button></div>`;
  if(!tourItems.length&&!pvItems.length){el.innerHTML=monthSel+'<div class="empty"><i class="ti ti-check" style="font-size:40px;display:block;margin-bottom:8px;color:var(--green)"></i>所選期間尾款皆已收齊</div>';return;}
  el.innerHTML=monthSel+`<div class="stat-row" style="grid-template-columns:1fr 1fr"><div class="stat-card"><div class="stat-label">待收項目</div><div class="stat-val">${tourItems.length+pvItems.length}</div></div><div class="stat-card"><div class="stat-label">尾款總計</div><div class="stat-val" style="color:var(--blue)">$${grand.toLocaleString()}</div></div></div>
  ${tourItems.map(item=>`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-weight:600">${item.label}</span><span style="font-weight:600;color:var(--blue)">$${item.subtotal.toLocaleString()}</span></div><div class="tbl-wrap"><table class="xtable"><thead><tr><th>姓名</th><th>人數</th><th>聯絡</th><th>電話</th><th style="text-align:right">應收</th><th></th></tr></thead><tbody>${item.bks.map(b=>`<tr><td style="font-weight:600">${b.name}</td><td>${b.count}人</td><td>${chBadge(b.channel)}</td><td style="font-size:12px">${b.phone||'-'}</td><td style="text-align:right;font-weight:600">$${(b.count*b.perPax).toLocaleString()}</td><td><button class="btn btn-sm btn-success" onclick="toggleBk('${b.id}','balancePaid',true)"><i class="ti ti-check"></i> 已收</button></td></tr>`).join('')}</tbody></table></div></div>`).join('')}
  ${pvItems.map(item=>`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-weight:600">${item.label}</span><div style="display:flex;align-items:center;gap:8px"><span style="font-weight:600;color:var(--blue)">$${item.subtotal.toLocaleString()}</span><button class="btn btn-sm btn-success" onclick="togglePv('${item.id}','balancePaid',true)"><i class="ti ti-check"></i> 已收</button></div></div></div>`).join('')}`;
}

// ══════════════════ PAGE: 司機頁面 ══════════════════
const MAINT_N={oil:'機油',tire:'輪胎',brake:'煞車',ac:'冷氣',battery:'電瓶',filter:'濾清器',repair:'維修',other:'其他'};
const TYPE_N={income:'客收',fuel:'加油',parking:'停車費',toll:'過路費',maint:'保養/維修',inspection:'驗車',other:'其他'};
function renderDriverPage(){
  const el=document.getElementById('p-driver');
  const drv=drivers.find(d=>d.id===curDriverId);if(!drv){el.innerHTML='<div class="empty">找不到司機資料</div>';return;}
  const myRecs=[...driverRecs.filter(r=>r.driverId===curDriverId)].sort((a,b)=>b.date>a.date?1:-1);
  const myIncome=myRecs.filter(r=>r.type==='income').reduce((s,r)=>s+r.amount,0);
  const myExp=myRecs.filter(r=>r.type!=='income').reduce((s,r)=>s+r.amount,0);
  const fuelRecs=myRecs.filter(r=>r.type==='fuel'&&r.mileage).sort((a,b)=>a.mileage-b.mileage);
  let avgKmL='—';if(fuelRecs.length>=2){const km=fuelRecs[fuelRecs.length-1].mileage-fuelRecs[0].mileage;const l=fuelRecs.slice(1).reduce((s,r)=>s+(r.fuelLiters||0),0);if(l>0)avgKmL=(km/l).toFixed(1)+' km/L';}
  const carMileage={};myRecs.filter(r=>r.mileage&&r.car).forEach(r=>{if(!carMileage[r.car]||r.mileage>carMileage[r.car])carMileage[r.car]=r.mileage;});
  const filterType=document.getElementById('dr-filter-type')?.value||'all';
  const filterCar=document.getElementById('dr-filter-car')?.value||'all';
  const filterMonth=document.getElementById('dr-filter-month')?.value||'';
  let filtered=myRecs;
  if(filterType!=='all')filtered=filtered.filter(r=>r.type===filterType);
  if(filterCar!=='all')filtered=filtered.filter(r=>r.car===filterCar);
  if(filterMonth)filtered=filtered.filter(r=>r.date&&r.date.startsWith(filterMonth));
  el.innerHTML=`<div class="card">
    <div style="font-size:15px;font-weight:700;margin-bottom:10px"><i class="ti ti-steering-wheel"></i> ${drv.name} — 我的記錄</div>
    <div class="stat-row" style="grid-template-columns:repeat(3,1fr)">
      <div class="stat-card"><div class="stat-label">客收合計</div><div class="stat-val" style="color:var(--green)">$${myIncome.toLocaleString()}</div></div>
      <div class="stat-card"><div class="stat-label">支出合計</div><div class="stat-val" style="color:var(--red)">$${myExp.toLocaleString()}</div></div>
      <div class="stat-card"><div class="stat-label">平均油耗</div><div class="stat-val" style="font-size:15px">${avgKmL}</div></div>
    </div>
    ${Object.keys(carMileage).length?`<div style="font-size:12px;color:var(--text2);margin-bottom:8px">最新里程：${Object.entries(carMileage).map(([c,m])=>`${c}: ${m.toLocaleString()} km`).join(' ／ ')}</div>`:''}
    <button class="btn btn-primary btn-sm" onclick="openRec()"><i class="ti ti-plus"></i> 新增記錄</button>
  </div>
  <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap">
    <select id="dr-filter-type" onchange="renderDriverPage()" style="height:34px;font-size:12px"><option value="all">全部</option>${Object.entries(TYPE_N).map(([k,v])=>`<option value="${k}">${v}</option>`).join('')}</select>
    <select id="dr-filter-car" onchange="renderDriverPage()" style="height:34px;font-size:12px"><option value="all">全部車輛</option>${carsList.map(c=>`<option value="${c}">${c}</option>`).join('')}</select>
    <input id="dr-filter-month" type="month" onchange="renderDriverPage()" style="height:34px;font-size:12px;width:135px">
  </div>
  ${!filtered.length?'<div class="empty">尚無記錄</div>':`<div class="tbl-wrap"><table class="xtable"><thead><tr><th>日期</th><th>車輛</th><th>類別</th><th>明細</th><th>里程</th><th style="text-align:right">金額</th><th></th></tr></thead><tbody>${filtered.map(r=>{const isIncome=r.type==='income';const mn=r.maintType?'('+MAINT_N[r.maintType]+')':'';const detail=[r.fuelLiters?r.fuelLiters+'L':'',r.note||''].filter(Boolean).join(' ');return`<tr><td>${r.date}</td><td style="font-size:11px">${r.car||'-'}</td><td><span class="badge" style="${isIncome?'background:var(--green-l);color:var(--green-d)':'background:var(--amber-l);color:var(--amber-d)'}">${TYPE_N[r.type]||r.type}${mn}</span></td><td style="font-size:11px;color:var(--text2)">${detail||'-'}</td><td style="font-size:11px">${r.mileage?r.mileage.toLocaleString()+' km':'-'}</td><td style="text-align:right;font-weight:600;color:${isIncome?'var(--green)':'var(--red)'}">$${(r.amount||0).toLocaleString()}</td><td><button class="btn btn-sm" onclick="openRec('${r.id}')"><i class="ti ti-edit"></i></button></td></tr>`}).join('')}</tbody></table></div>`}`;
}
function getLastKm(carId,excId=''){const recs=driverRecs.filter(r=>r.car===carId&&r.mileage&&r.id!==excId).sort((a,b)=>b.mileage-a.mileage);return recs.length?recs[0].mileage:0;}
function openRec(id=''){
  eIds.rec=id||null;const r=id?driverRecs.find(x=>x.id===id):null;
  document.getElementById('mr-title').textContent=id?'編輯記錄':'新增記錄';document.getElementById('btn-del-rec').style.display=id?'inline-flex':'none';
  document.getElementById('rf-date').value=r?.date||new Date().toISOString().slice(0,10);document.getElementById('rf-type').value=r?.type||'income';document.getElementById('rf-amt').value=r?.amount||'';document.getElementById('rf-note').value=r?.note||'';
  const cs=document.getElementById('rf-car');cs.innerHTML='<option value="">— 選擇 —</option>'+carsList.map(c=>`<option value="${c}"${c===r?.car?' selected':''}>${c}</option>`).join('');
  document.getElementById('rf-mileage').value=r?.mileage||'';document.getElementById('rf-liters').value=r?.fuelLiters||'';document.getElementById('rf-maint').value=r?.maintType||'oil';document.getElementById('rf-maint-km').value=r?.mileage||'';
  document.getElementById('rf-km-alert').style.display='none';
  toggleRecFields();om('rec');
}
function toggleRecFields(){const t=document.getElementById('rf-type').value;document.getElementById('rf-mileage-wrap').style.display=(t==='fuel'||t==='inspection')?'block':'none';document.getElementById('rf-fuel-wrap').style.display=t==='fuel'?'block':'none';document.getElementById('rf-maint-wrap').style.display=t==='maint'?'block':'none';}
document.getElementById('rf-car').addEventListener('change',checkKmAlert);
document.addEventListener('input',e=>{if(e.target.id==='rf-mileage')checkKmAlert();});
function checkKmAlert(){const car=document.getElementById('rf-car').value,km=parseInt(document.getElementById('rf-mileage').value)||0;if(!car||!km)return;const last=getLastKm(car,eIds.rec||'');document.getElementById('rf-km-alert').style.display=(last&&km<last)?'block':'none';if(km&&last>0&&document.getElementById('rf-fuel-prev'))document.getElementById('rf-fuel-prev').textContent=km>last?'距上次加油：'+(km-last).toLocaleString()+' km':'';}
async function saveRec(){
  const date=document.getElementById('rf-date').value,type=document.getElementById('rf-type').value;if(!date)return alert('請填寫日期');
  const drv=drivers.find(d=>d.id===curDriverId);setSS('syncing','儲存中…');
  const data={date,type,amount:parseInt(document.getElementById('rf-amt').value)||0,driverId:curDriverId,driverName:drv?.name||'',car:document.getElementById('rf-car').value,note:document.getElementById('rf-note').value.trim(),mileage:parseInt(document.getElementById('rf-mileage').value)||0,fuelLiters:parseFloat(document.getElementById('rf-liters').value)||0,maintType:type==='maint'?(document.getElementById('rf-maint')?.value||'oil'):'',};
  if(eIds.rec)await db.collection('driverRecs').doc(eIds.rec).update(data);else await db.collection('driverRecs').doc(uid()).set(data);cm('rec');
}
async function delRec(){if(!confirm('確定刪除？'))return;await db.collection('driverRecs').doc(eIds.rec).delete();cm('rec');}

// ══════════════════ PAGE: 設定 ══════════════════
function renderSettings(){
  const el=document.getElementById('p-settings');
  el.innerHTML=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><span class="card-title" style="margin:0"><i class="ti ti-users"></i> 自家司機</span><button class="btn btn-primary btn-sm" onclick="openDriver('','own')"><i class="ti ti-plus"></i> 新增</button></div>
    ${!drivers.filter(d=>d.type==='own').length?'<div class="empty" style="padding:1rem">尚無司機</div>':`<div class="tbl-wrap"><table class="xtable"><thead><tr><th>姓名</th><th>電話</th><th>月薪</th><th>每趟</th><th>備註</th><th></th></tr></thead><tbody>${drivers.filter(d=>d.type==='own').map(d=>`<tr><td style="font-weight:600">${d.name}</td><td>${d.phone||'-'}</td><td>${d.salary?'$'+d.salary.toLocaleString():'-'}</td><td>${d.perTrip?'$'+d.perTrip.toLocaleString():'-'}</td><td style="font-size:12px;color:var(--text2)">${d.note||'-'}</td><td><button class="btn btn-sm" onclick="openDriver('${d.id}')"><i class="ti ti-edit"></i></button></td></tr>`).join('')}</tbody></table></div>`}
  </div>
  <div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><span class="card-title" style="margin:0"><i class="ti ti-user-bolt"></i> 外派司機</span><button class="btn btn-primary btn-sm" onclick="openDriver('','external')"><i class="ti ti-plus"></i> 新增</button></div>
    ${!drivers.filter(d=>d.type==='external').length?'<div class="empty" style="padding:0.5rem;font-size:13px">尚無外派司機資料</div>':`<div class="tbl-wrap"><table class="xtable"><thead><tr><th>姓名</th><th>電話</th><th>每天費用</th><th>地區</th><th>備註</th><th></th></tr></thead><tbody>${drivers.filter(d=>d.type==='external').map(d=>`<tr><td style="font-weight:600">${d.name}</td><td>${d.phone||'-'}</td><td>${d.perTrip?'$'+d.perTrip.toLocaleString()+'/天':'-'}</td><td style="font-size:12px">${d.area||'-'}</td><td style="font-size:12px;color:var(--text2)">${d.note||'-'}</td><td><button class="btn btn-sm" onclick="openDriver('${d.id}')"><i class="ti ti-edit"></i></button></td></tr>`).join('')}</tbody></table></div>`}
  </div>
  <div class="card"><div class="card-title"><i class="ti ti-building"></i> 酒店資料庫</div><button class="btn btn-primary btn-sm" onclick="openHotel()" style="margin-bottom:10px"><i class="ti ti-plus"></i> 新增酒店</button>
    ${!hotels.length?'<div class="empty" style="padding:0.5rem">尚無酒店</div>':`<div class="tbl-wrap"><table class="xtable"><thead><tr><th>名稱</th><th>地區</th><th>2人平/假</th><th>3人平/假</th><th>4人平/假</th><th>備註</th><th></th></tr></thead><tbody>${hotels.map(h=>`<tr><td style="font-weight:600">${h.name}</td><td>${h.area||'-'}</td><td>${h.r2?'$'+h.r2+(h.r2wk&&h.r2wk!==h.r2?'/$'+h.r2wk:''):'-'}</td><td>${h.r3?'$'+h.r3+(h.r3wk&&h.r3wk!==h.r3?'/$'+h.r3wk:''):'-'}</td><td>${h.r4?'$'+h.r4+(h.r4wk&&h.r4wk!==h.r4?'/$'+h.r4wk:''):'-'}</td><td style="font-size:11px;color:var(--text2)">${h.note||'-'}</td><td><button class="btn btn-sm" onclick="openHotel('${h.id}')"><i class="ti ti-edit"></i></button></td></tr>`).join('')}</tbody></table></div>`}
  </div>
  <div class="card"><div class="card-title"><i class="ti ti-car"></i> 車輛管理</div>
    <div id="cars-list">${carsList.map((c,i)=>`<div style="display:flex;gap:8px;margin-bottom:8px"><input id="car-${i}" value="${c}" style="max-width:180px"><button class="btn btn-sm btn-danger" onclick="removeCar(${i})"><i class="ti ti-trash"></i></button></div>`).join('')}</div>
    <div style="display:flex;gap:8px;margin-top:4px"><button class="btn btn-sm" onclick="addCar()"><i class="ti ti-plus"></i> 新增車輛</button><button class="btn btn-sm btn-primary" onclick="saveCars()"><i class="ti ti-device-floppy"></i> 儲存</button></div>
  </div>
  <div class="card"><div class="card-title"><i class="ti ti-settings"></i> 固定支出管理</div>
    ${fixedExpenses.length?`<div class="tbl-wrap" style="margin-bottom:10px"><table class="xtable"><thead><tr><th>名稱</th><th>週期</th><th>金額</th><th>期間</th><th></th></tr></thead><tbody>${fixedExpenses.map(f=>`<tr><td style="font-weight:600">${f.name}</td><td>${f.cycle==='monthly'?'每月':'每年'}</td><td style="color:var(--red)">$${f.amount.toLocaleString()}</td><td style="font-size:11px;color:var(--text2)">${f.start||'—'}${f.end?' 至 '+f.end:''}</td><td><button class="btn btn-sm" onclick="openFixed('${f.id}')"><i class="ti ti-edit"></i></button></td></tr>`).join('')}</tbody></table></div>`:''}
    <button class="btn btn-primary btn-sm" onclick="openFixed()"><i class="ti ti-plus"></i> 新增固定支出</button>
  </div>
  <div class="card"><div class="card-title"><i class="ti ti-adjustments"></i> 成本預設值</div>
    <div class="fg2"><div><label>外派司機每天費用（元）</label><input id="cs-day" type="number" value="${costSettings.driverDayRate||5000}"></div><div><label>外宿補貼每晚（元）</label><input id="cs-night" type="number" value="${costSettings.driverNightRate||1000}"></div></div>
    <button class="btn btn-primary btn-sm" onclick="saveCostSetting()"><i class="ti ti-device-floppy"></i> 儲存設定</button>
  </div>`;
}
function addCar(){carsList.push('');renderSettings();}
function removeCar(i){carsList.splice(i,1);renderSettings();}
async function saveCars(){const nc=carsList.map((_,i)=>document.getElementById('car-'+i)?.value.trim()).filter(Boolean);carsList=nc;await db.collection('meta').doc('cars').set({list:carsList});alert('車輛已儲存');renderSettings();}
async function saveCostSetting(){await db.collection('meta').doc('costSettings').set({driverDayRate:parseInt(document.getElementById('cs-day').value)||5000,driverNightRate:parseInt(document.getElementById('cs-night').value)||1000},{merge:true});alert('設定已儲存');}

function toggleDvType(){const t=document.getElementById("dvf-type").value;document.getElementById("dvf-own-fields").style.display=t==="own"?"block":"none";document.getElementById("dvf-ext-fields").style.display=t==="external"?"block":"none";}
function openDriver(id='',forceType=''){
  eIds.driver=id||null;const d=id?drivers.find(x=>x.id===id):null;
  const dtype=d?.type||forceType||'own';
  document.getElementById('mdv-title').textContent=id?'編輯司機':(dtype==='external'?'新增外派司機':'新增自家司機');
  document.getElementById('btn-del-driver').style.display=id?'inline-flex':'none';
  document.getElementById('dvf-name').value=d?.name||'';document.getElementById('dvf-phone').value=d?.phone||'';
  document.getElementById('dvf-type').value=dtype;
  document.getElementById('dvf-own-fields').style.display=dtype==='own'?'block':'none';
  document.getElementById('dvf-ext-fields').style.display=dtype==='external'?'block':'none';
  document.getElementById('dvf-pwd').value=d?.password||'';document.getElementById('dvf-salary').value=d?.salary||0;const isExt=dtype==='external';
if(isExt){document.getElementById('dvf-extper').value=d?.perTrip||0;}else{document.getElementById('dvf-salary').value=d?.salary||0;document.getElementById('dvf-per').value=d?.perTrip||0;}
  document.getElementById('dvf-area').value=d?.area||'';
  document.getElementById('dvf-note').value=d?.note||'';om('driver');
}
async function saveDriver(){const name=document.getElementById('dvf-name').value.trim();const dtype=document.getElementById('dvf-type').value;if(!name)return alert('請填寫姓名');const pwd=document.getElementById('dvf-pwd').value;if(dtype==='own'&&!pwd)return alert('自家司機需填寫密碼');setSS('syncing','儲存中…');const extPer=document.getElementById('dvf-extper');const data={name,phone:document.getElementById('dvf-phone').value.trim(),password:pwd,salary:parseInt(document.getElementById('dvf-salary')?.value)||0,perTrip:dtype==='external'?(parseInt(extPer?.value)||0):(parseInt(document.getElementById('dvf-per')?.value)||0),area:document.getElementById('dvf-area').value.trim(),note:document.getElementById('dvf-note').value.trim(),type:dtype};if(eIds.driver)await db.collection('drivers').doc(eIds.driver).update(data);else await db.collection('drivers').doc(uid()).set(data);cm('driver');}
async function delDriver(){if(!confirm('確定刪除？'))return;await db.collection('drivers').doc(eIds.driver).delete();cm('driver');}

function openHotel(id=''){
  eIds.hotel=id||null;const h=id?hotels.find(x=>x.id===id):null;
  document.getElementById('mh-title').textContent=id?'編輯酒店':'新增酒店';document.getElementById('btn-del-hotel').style.display=id?'inline-flex':'none';
  document.getElementById('hf-name').value=h?.name||'';document.getElementById('hf-area').value=h?.area||'';document.getElementById('hf-r2').value=h?.r2||0;document.getElementById('hf-r3').value=h?.r3||0;document.getElementById('hf-r4').value=h?.r4||0;document.getElementById('hf-r2wk').value=h?.r2wk||0;document.getElementById('hf-r3wk').value=h?.r3wk||0;document.getElementById('hf-r4wk').value=h?.r4wk||0;document.getElementById('hf-note').value=h?.note||'';om('hotel');
}
async function saveHotel(){const name=document.getElementById('hf-name').value.trim();if(!name)return alert('請填寫酒店名稱');setSS('syncing','儲存中…');const r2wkv=parseInt(document.getElementById('hf-r2wk').value)||0,r3wkv=parseInt(document.getElementById('hf-r3wk').value)||0,r4wkv=parseInt(document.getElementById('hf-r4wk').value)||0;const data={name,area:document.getElementById('hf-area').value.trim(),r2:parseInt(document.getElementById('hf-r2').value)||0,r3:parseInt(document.getElementById('hf-r3').value)||0,r4:parseInt(document.getElementById('hf-r4').value)||0,r2wk:r2wkv||parseInt(document.getElementById('hf-r2').value)||0,r3wk:r3wkv||parseInt(document.getElementById('hf-r3').value)||0,r4wk:r4wkv||parseInt(document.getElementById('hf-r4').value)||0,note:document.getElementById('hf-note').value.trim()};if(eIds.hotel)await db.collection('hotels').doc(eIds.hotel).update(data);else await db.collection('hotels').doc(uid()).set(data);cm('hotel');}
async function delHotel(){if(!confirm('確定刪除？'))return;await db.collection('hotels').doc(eIds.hotel).delete();cm('hotel');}

// ══════════════════ INIT ══════════════════
async function initDefaultDrivers(){
  const snap=await db.collection('drivers').get();
  if(snap.empty){await db.collection('drivers').doc(uid()).set({name:'阿國',phone:'',password:'0000',salary:0,perTrip:0,note:'',type:'own'});await db.collection('drivers').doc(uid()).set({name:'子碩',phone:'',password:'0000',salary:0,perTrip:0,note:'',type:'own'});}
}
// 初始載入司機清單（未登入時也需要顯示選單）
db.collection('drivers').onSnapshot(s=>{drivers=s.docs.map(d=>({id:d.id,...d.data()}));populateLoginSel();});
db.collection('tours').onSnapshot(s=>{tours=s.docs.map(d=>({id:d.id,...d.data()}));if(document.getElementById('pub-screen').style.display!=='none')initPubPage();});
db.collection('meta').doc('cars').onSnapshot(s=>{if(s.exists&&s.data().list)carsList=s.data().list;});

// 判斷是否公開報名頁
if(window.location.hash==='#booking'){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('pub-screen').style.display='flex';
  initListeners();
  db.collection('tours').onSnapshot(s=>{tours=s.docs.map(d=>({id:d.id,...d.data()}));initPubPage();});
} else if(window.location.hash==='#driver'){
  // 來自 driver.html 的跳轉
  const driverData=JSON.parse(sessionStorage.getItem('driverLogin')||'null');
  if(driverData){
    db.collection('drivers').onSnapshot(s=>{
      drivers=s.docs.map(d=>({id:d.id,...d.data()}));
      if(!curRole){
        const drv=drivers.find(d=>d.id===driverData.id);
        if(drv){
          curRole='driver';curDriverId=driverData.id;
          document.getElementById('login-screen').style.display='none';
          document.getElementById('app').style.display='block';
          document.getElementById('app-title').textContent=drv.name+' — 司機頁面';
          buildNav('driver');initListeners();showPage('p-driver');
        }
      }
    });
  } else { initDefaultDrivers(); }
} else {
  initDefaultDrivers();
  // 自動登入：若裝置已記住管理員
  if(localStorage.getItem('adminDeviceTrusted_v1')==='1'){
    // 等 Firebase 初始化後直接進入
    setTimeout(()=>loginAs('admin'),300);
  }
  // 自動登入：若裝置已記住司機（透過 index.html 登入的情況）
  else{
    const savedDrv=localStorage.getItem('driverDeviceTrusted_v1');
    if(savedDrv){
      db.collection('drivers').onSnapshot(s=>{
        if(curRole)return;
        drivers=s.docs.map(d=>({id:d.id,...d.data()}));
        try{
          const info=JSON.parse(savedDrv);
          const drv=drivers.find(d=>d.id===info.id);
          if(drv){
            curRole='driver';curDriverId=drv.id;
            document.getElementById('login-screen').style.display='none';
            document.getElementById('app').style.display='block';
            document.getElementById('app-title').textContent=drv.name+' — 司機頁面';
            buildNav('driver');initListeners();showPage('p-driver');
          }
        }catch(e){localStorage.removeItem('driverDeviceTrusted_v1');}
      });
    }
  }
}
</script>
