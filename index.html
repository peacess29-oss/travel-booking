<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="旅遊管理">
<title>旅遊業務管理系統</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/tabler-icons.min.css">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fff;--bg2:#f6f6f6;--bg3:#eee;--text:#1a1a1a;--text2:#666;--text3:#999;--border:#e0e0e0;--border2:#ccc;--blue:#185FA5;--blue-l:#E6F1FB;--blue-d:#0C447C;--green:#3B6D11;--green-l:#EAF3DE;--green-d:#1A5201;--amber:#E59F00;--amber-l:#FFF3CD;--amber-d:#cc7a00;--red:#da3633;--red-l:#FFEBEE;--red-d:#b71c1c;--purple:#7B2CBF;--purple-l:#f3e5ff}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;--text:#f2f2f7;--text2:#aeaeb2;--text3:#636366;--border:#3a3a3c;--border2:#48484a;}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg2);color:var(--text);font-size:15px;min-height:100vh}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#dbeafe,#dcfce7)}
.login-card{background:var(--bg);border-radius:16px;padding:28px 32px;width:360px;max-width:95vw;box-shadow:0 4px 32px rgba(0,0,0,.12)}
.login-title{font-size:22px;font-weight:700;text-align:center;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--text2);text-align:center;margin-bottom:22px}
.role-btn{width:100%;padding:12px 14px;border:1px solid var(--border2);border-radius:10px;font-size:13px;cursor:pointer;background:var(--bg);color:var(--text);display:flex;align-items:center;gap:10px;transition:.2s}
.role-btn:hover{background:var(--blue-l);border-color:var(--blue)}
.topbar{background:var(--bg);border-bottom:1px solid var(--border);padding:0 16px;height:48px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:60}
.topbar-brand{font-size:15px;font-weight:700;display:flex;align-items:center;gap:7px}
.sync-pill{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);padding:3px 9px;background:var(--bg2);border-radius:20px;border:1px solid var(--border)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green)}
.sync-dot.syncing{background:#EF9F27;animation:pulse 1s infinite}
.sync-dot.error{background:#e03030}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.nav{background:var(--bg);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;position:sticky;top:48px;z-index:50}
.nav::-webkit-scrollbar{display:none}
.nav-tab{padding:10px 14px;font-size:13px;cursor:pointer;border:none;background:none;color:var(--text2);border-bottom:2px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:4px;transition:.2s}
.nav-tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}
.nav-tab:hover:not(.active){background:var(--bg2)}
.page{display:none;max-width:1100px;margin:0 auto;padding:14px 16px 60px}
.page.active{display:block}
.card{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px}
.card-title{font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px}
label{font-size:13px;color:var(--text2);display:block;margin-bottom:3px}
input,select,textarea{width:100%;padding:9px 10px;border:1px solid var(--border2);border-radius:8px;font-size:14px;background:var(--bg);color:var(--text);height:36px}
textarea{height:auto;resize:vertical}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 2px rgba(24,95,165,.08)}
.btn{padding:8px 14px;border:1px solid var(--border2);border-radius:8px;font-size:13px;cursor:pointer;background:var(--bg);color:var(--text);display:inline-flex;align-items:center;gap:4px;transition:.2s}
.btn:hover{background:var(--bg2)}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--blue);color:#E6F1FB;border-color:var(--blue)}
.btn-primary:hover{background:var(--blue-d)}
.btn-sm{padding:4px 9px;font-size:12px}
.btn-success{background:var(--green);color:var(--green-l);border-color:var(--green)}
.btn-success:hover{background:var(--green-d)}
.btn-warn{background:var(--amber);color:var(--amber-l);border-color:var(--amber)}
.btn-danger{color:var(--red);border-color:#F09595}
.btn-danger:hover{background:var(--red-l)}
.badge{display:inline-flex;align-items:center;gap:2px;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.badge-red{background:var(--red-l);color:var(--red-d)}
.badge-blue{background:var(--blue-l);color:var(--blue-d)}
.badge-green{background:var(--green-l);color:var(--green-d)}
.badge-amber{background:var(--amber-l);color:var(--amber-d)}
.fg{display:flex;gap:10px;margin-bottom:10px}
.fg>div{flex:1;min-width:0}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px}
.mb10{margin-bottom:10px}
.divider{height:1px;background:var(--border);margin:12px 0}
.stat-row{display:grid;gap:8px;margin-bottom:12px}
.stat-card{background:var(--bg2);border-radius:8px;padding:10px 12px;border:1px solid var(--border)}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:2px}
.stat-val{font-size:18px;font-weight:700}
.tbl-wrap{overflow-x:auto;border-radius:8px;border:1px solid var(--border)}
.xtable{width:100%;border-collapse:collapse;font-size:13px}
.xtable th{background:var(--bg2);padding:8px 10px;text-align:left;font-weight:600;color:var(--text2);border:1px solid var(--border);white-space:nowrap}
.xtable td{padding:7px 10px;border:1px solid var(--border);vertical-align:middle}
.xtable tbody tr:hover td{background:rgba(0,0,0,.02)}
.xtable tfoot td{background:var(--bg2);font-weight:600}
.xtable .chk{text-align:center;cursor:pointer;user-select:none;font-size:15px}
.xtable .chk:hover{background:var(--bg3)!important}
.cal-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dow{text-align:center;font-size:11px;font-weight:600;color:var(--text2);padding:4px;background:var(--bg2);border-radius:4px}
.cal-cell{min-height:74px;border:1px solid var(--border);border-radius:6px;padding:3px;background:var(--bg);cursor:pointer;transition:border-color .1s}
.cal-cell:hover{border-color:var(--blue)}
.cal-cell.today{border:2px solid var(--blue)}
.cal-cell.holiday{background:#fff8f8}
.cal-cell.holiday .cal-date{color:var(--red)}
.cal-cell.makeup .cal-date{color:var(--blue)}
.cal-cell.other-month{opacity:.4;background:var(--bg2)}
.cal-date{font-size:11px;font-weight:600;margin-bottom:2px}
.cal-pill{font-size:10px;padding:1px 4px;border-radius:3px;margin-bottom:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cal-pill.own{background:var(--green-l);color:var(--green-d)}
.cal-pill.out{background:var(--amber-l);color:var(--amber-d)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:var(--bg);border-radius:12px;padding:20px;width:560px;max-width:100%;margin:auto;box-shadow:0 8px 40px rgba(0,0,0,.18)}
.modal-lg{width:660px}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.mh-title{font-size:15px;font-weight:700}
.mf{display:flex;justify-content:space-between;align-items:center;margin-top:16px}
.empty{text-align:center;padding:2.5rem;color:var(--text2)}
.info-box{background:var(--blue-l);border:1px solid #B5D4F4;border-radius:8px;padding:10px 12px;font-size:12px;color:var(--blue-d);margin-bottom:10px}
.warn-box{background:var(--amber-l);border:1px solid #FAC775;border-radius:8px;padding:10px 12px;font-size:12px;color:var(--amber-d);margin-bottom:10px}
.ok-box{background:var(--green-l);border:1px solid #97C459;border-radius:8px;padding:10px 12px;font-size:12px;color:var(--green-d);margin-bottom:10px}
.err-box{background:var(--red-l);border:1px solid #F09595;border-radius:8px;padding:10px 12px;font-size:12px;color:var(--red-d);margin-bottom:10px}
.pbar-wrap{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.pbar{height:100%;border-radius:2px;transition:width .3s}
.tag-hol{font-size:10px;color:var(--red);background:var(--red-l);padding:1px 4px;border-radius:3px}
.tag-mkp{font-size:10px;color:var(--blue);background:var(--blue-l);padding:1px 4px;border-radius:3px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bar-label{width:80px;font-size:12px;color:var(--text2);text-align:right;flex-shrink:0}
.bar-wrap{flex:1;height:20px;background:var(--bg3);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .4s}
.bar-val{width:80px;font-size:12px;font-weight:600;flex-shrink:0}
.mo-chart{display:flex;align-items:flex-end;gap:3px;height:120px;padding:0 4px;border-bottom:1px solid var(--border);margin-bottom:6px}
.mo-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.mo-bar{width:100%;border-radius:3px 3px 0 0}
.mo-bar-lbl{font-size:10px;color:var(--text2);text-align:center}
.summary-profit{border-radius:10px;padding:14px;margin-bottom:12px;background:linear-gradient(135deg,var(--green-l),#f0fbe0);border:1px solid #97C459}
.summary-loss{border-radius:10px;padding:14px;margin-bottom:12px;background:linear-gradient(135deg,var(--red-l),#fff0f0);border:1px solid #F09595}
.pub-wrap{min-height:100vh;background:linear-gradient(135deg,#dbeafe,#dcfce7);display:flex;align-items:flex-start;justify-content:center;padding:24px 16px}
.pub-card{background:var(--bg);border-radius:16px;padding:28px;width:460px;max-width:100%;box-shadow:0 4px 24px rgba(0,0,0,.1)}
.pub-title{font-size:20px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.pub-sub{font-size:13px;color:var(--text2);margin-bottom:22px}
</style>
</head>
<body>
<!-- ═══ LOGIN ═══ -->
<div id="login-screen" class="login-wrap">
  <div class="login-card">
    <div class="login-title">🚌 旅遊業務管理</div>
    <div class="login-sub">請選擇身份登入</div>
    <button class="role-btn" onclick="adminLogin()">
      <i class="ti ti-shield-lock" style="font-size:22px;color:var(--blue)"></i>
      <div><div>業務管理員</div><div style="font-size:11px;color:var(--text2)">完整管理功能</div></div>
    </button>
    <div id="admin-pwd-wrap" style="display:none;margin-top:-4px;margin-bottom:8px">
      <input type="password" id="admin-pwd-input" placeholder="請輸入管理員密碼" style="margin-bottom:6px;height:36px" onkeydown="if(event.key==='Enter')adminPwdConfirm()">
      <div id="admin-pwd-err" style="color:var(--red);font-size:12px;margin-bottom:6px;display:none"><i class="ti ti-alert-circle"></i> 密碼錯誤，請重新輸入</div>
      <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="adminPwdConfirm()"><i class="ti ti-login"></i> 確認登入</button>
    </div>
    <div style="border-top:1px solid var(--border);margin:12px 0;padding-top:12px">
      <div class="mb10"><label>司機登入</label><select id="login-drv-sel" style="height:36px"></select></div>
      <div class="mb10"><label>密碼</label><input type="password" id="login-pwd" placeholder="請輸入密碼" onkeydown="if(event.key==='Enter')loginDriver()"></div>
      <div id="login-err" style="color:var(--red);font-size:12px;margin-bottom:6px;display:none"><i class="ti ti-alert-circle"></i> 密碼錯誤</div>
      <button class="btn btn-success" style="width:100%;justify-content:center" onclick="loginDriver()"><i class="ti ti-steering-wheel"></i> 司機登入</button>
    </div>
  </div>
</div>

<!-- ═══ MAIN APP ═══ -->
<div id="app" style="display:none">
  <div class="topbar">
    <div class="topbar-brand" id="app-brand"><i class="ti ti-bus" style="color:var(--blue)"></i><span id="app-title">旅遊業務管理系統</span></div>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="sync-pill"><div class="sync-dot syncing" id="sync-dot"></div><span id="sync-msg">連線中</span></div>
      <button class="btn btn-sm" onclick="logout()"><i class="ti ti-logout"></i> 登出</button>
    </div>
  </div>
  <div class="nav" id="main-nav"></div>
  <div id="p-group" class="page active"></div>
  <div id="p-private" class="page"></div>
  <div id="p-dispatch" class="page"></div>
  <div id="p-finance" class="page"></div>
  <div id="p-balance" class="page"></div>
  <div id="p-driver" class="page"></div>
  <div id="p-settings" class="page"></div>
</div>

<!-- 包車團 MODAL -->
<div class="overlay" id="m-priv"><div class="modal modal-lg">
  <div class="mh"><span class="mh-title" id="mp-title">新增包車團</span><button class="btn btn-sm" onclick="cm('priv')"><i class="ti ti-x"></i></button></div>
  <div class="fg2"><div><label>團名 *</label><input id="pf-name" placeholder="王先生一家"></div><div><label>類型</label><select id="pf-type" onchange="togglePriv()"><option value="car+hotel">車+住宿</option><option value="car">純包車</option></select></div></div>
  <div class="fg3"><div><label>出發日 *</label><input id="pf-start" type="date" onchange="calcPrivDays()"></div><div><label>結束日 *</label><input id="pf-end" type="date" onchange="calcPrivDays()"></div><div><label>天數</label><input id="pf-days" type="text" disabled></div></div>
  <div class="fg3"><div><label>人數</label><input id="pf-pax" type="number" value="1" min="1"></div><div><label>車輛數</label><input id="pf-cars" type="number" value="1" min="1"></div><div><label>車型</label><input id="pf-cartype"></div></div>
  <div class="fg2"><div><label>總報價（元）</label><input id="pf-price" type="number" placeholder="20000"></div><div><label>定金（元）</label><input id="pf-dep" type="number" placeholder="5000"></div></div>
  <div id="pf-hotel-sec"><div class="divider"></div><div style="font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px">🏨 住宿安排（每晚可選不同酒店）</div>
    <div class="fg2" style="margin-bottom:8px"><div><label>住宿晚數</label><input id="pf-nights" type="number" value="0" min="0" onchange="renderNightlyPicker()"></div></div>
    <div id="pf-nightly-picker"></div>
    <div id="pf-hotel-cost" style="font-size:13px;color:var(--green-d);font-weight:600;margin-top:6px"></div>
  </div>
  <div class="divider"></div>
  <div class="fg2"><div><label>旅遊險整團金額（元）</label><input id="pf-ins" type="number" value="0" placeholder="整團保費"></div></div>
  <div class="fg2"><div><label>電話</label><input id="pf-phone" placeholder="0912345678"></div><div><label>帳號</label><input id="pf-contact" placeholder="LINE ID"></div></div>
  <div class="mb10"><label>備註</label><textarea id="pf-note" style="height:48px" placeholder="接機、特殊需求…"></textarea></div>
  <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:10px">
    <label style="display:flex;align-items:center;gap:5px;cursor:pointer"><input type="checkbox" id="pf-depaid" style="width:14px;height:14px"> 定金已付</label>
    <label style="display:flex;align-items:center;gap:5px;cursor:pointer"><input type="checkbox" id="pf-balpaid" style="width:14px;height:14px"> 尾款已付</label>
    <label style="display:flex;align-items:center;gap:5px;cursor:pointer"><input type="checkbox" id="pf-ins-chk" style="width:14px;height:14px" onchange="togglePrivIns()"> 需投旅遊險</label>
  </div>
  <div id="pf-cost-sum" style="background:var(--bg2);border-radius:8px;padding:10px;font-size:12px"></div>
  <div class="mf"><button class="btn btn-danger btn-sm" id="btn-del-priv" style="display:none" onclick="delPriv()"><i class="ti ti-trash"></i></button><div style="display:flex;gap:8px;margin-left:auto"><button class="btn btn-sm" onclick="cm('priv')">取消</button><button class="btn btn-primary btn-sm" onclick="savePriv();cm('priv')"><i class="ti ti-check"></i> 儲存</button></div></div>
</div></div>

<script>
firebase.initializeApp({apiKey:"AIzaSyAQNo3CGRWbFdGfyO2GFetJYjc4MGAc-yU",authDomain:"travel-booking-233b7.firebaseapp.com",projectId:"travel-booking-233b7",storageBucket:"travel-booking-233b7.appspot.com"});
const db=firebase.firestore();

let privates=[],drivers=[],hotels=[],costSettings={driverDayRate:5000,driverNightRate:1000};
let curRole='',curDriverId='',eIds={};
let nightlyHotels=[];
const ADMIN_PASSWORD='jay888';
const ADMIN_DEVICE_KEY='adminDeviceTrusted_v1';

function setSS(s,m){document.getElementById('sync-dot').className='sync-dot'+(s==='syncing'?' syncing':s==='error'?' error':'');document.getElementById('sync-msg').textContent=m;}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function om(n){document.getElementById('m-'+n).classList.add('open')}
function cm(n){document.getElementById('m-'+n).classList.remove('open')}
document.querySelectorAll('.overlay').forEach(el=>el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open')}));

function calcDays(s,e){if(!s||!e)return 0;return Math.max(0,Math.round((new Date(e)-new Date(s))/86400000)+1);}
function isHol(d){const w=new Date(d).getDay();return w===0||w===6;}
function getPrivStatus(p){const today=new Date().toISOString().slice(0,10);if(p.end<today)return{label:'已完成',cls:'badge-green',done:true};if(!p.assignedDriver)return{label:'待派車',cls:'badge-red',done:false};if(p.start<=today&&today<=p.end)return{label:'出團中',cls:'badge-amber',done:false};return{label:'已派車 '+p.assignedDriver,cls:'badge-blue',done:false};}

function initListeners(){
  setSS('syncing','連線中');
  db.collection('privates').onSnapshot(s=>{privates=s.docs.map(d=>({id:d.id,...d.data()}));refresh();setSS('ok','已同步 ✓')},()=>setSS('error','連線失敗'));
  db.collection('drivers').onSnapshot(s=>{drivers=s.docs.map(d=>({id:d.id,...d.data()}));populateLoginSel();refresh();});
  db.collection('hotels').onSnapshot(s=>{hotels=s.docs.map(d=>({id:d.id,...d.data()}));});
  db.collection('meta').doc('costSettings').onSnapshot(s=>{if(s.exists)costSettings={...costSettings,...s.data()};});
}
function refresh(){if(curRole==='admin')renderPrivate();}

function populateLoginSel(){const sel=document.getElementById('login-drv-sel');if(!sel)return;sel.innerHTML=drivers.filter(d=>d.type==='own').map(d=>`<option value="${d.id}">${d.name}</option>`).join('');}
function adminLogin(){if(localStorage.getItem(ADMIN_DEVICE_KEY)==='1'){loginAs('admin');return;}const wrap=document.getElementById('admin-pwd-wrap');if(wrap.style.display==='none'){wrap.style.display='block';document.getElementById('admin-pwd-input').focus();}}
function adminPwdConfirm(){const pwd=document.getElementById('admin-pwd-input').value;if(pwd!==ADMIN_PASSWORD){document.getElementById('admin-pwd-err').style.display='block';document.getElementById('admin-pwd-input').value='';document.getElementById('admin-pwd-input').focus();return;}localStorage.setItem(ADMIN_DEVICE_KEY,'1');document.getElementById('admin-pwd-wrap').style.display='none';document.getElementById('admin-pwd-err').style.display='none';loginAs('admin');}
function loginAs(role){curRole=role;curDriverId='';document.getElementById('login-screen').style.display='none';document.getElementById('app').style.display='block';document.getElementById('app-title').textContent='旅遊業務管理系統';initListeners();renderPrivate();}
function loginDriver(){const drvId=document.getElementById('login-drv-sel').value;const pwd=document.getElementById('login-pwd').value;const drv=drivers.find(d=>d.id===drvId);if(!drv||drv.password!==pwd){document.getElementById('login-err').style.display='block';return;}localStorage.setItem('driverDeviceTrusted_v1',JSON.stringify({id:drvId,name:drv.name}));curRole='driver';curDriverId=drvId;document.getElementById('login-err').style.display='none';document.getElementById('login-screen').style.display='none';document.getElementById('app').style.display='block';document.getElementById('app-title').textContent=drv.name+' — 司機頁面';initListeners();}
function logout(){const wasRole=curRole;curRole='';curDriverId='';if(wasRole==='admin')localStorage.removeItem('adminDeviceTrusted_v1');if(wasRole==='driver')localStorage.removeItem('driverDeviceTrusted_v1');document.getElementById('login-screen').style.display='flex';document.getElementById('app').style.display='none';document.getElementById('login-pwd').value='';document.getElementById('login-err').style.display='none';}

function renderPrivate(){const el=document.getElementById('p-group');if(!el)return;const pend=privates.filter(p=>getPrivStatus(p).label==='待派車').length;el.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px"><span style="font-size:14px;font-weight:600">包車團（${privates.length}）</span><button class="btn btn-primary btn-sm" onclick="openPriv()"><i class="ti ti-plus"></i> 新增包車團</button></div><div class="stat-row" style="grid-template-columns:repeat(4,1fr)"><div class="stat-card"><div class="stat-label">總數</div><div class="stat-val">${privates.length}</div></div><div class="stat-card"><div class="stat-label">待派車</div><div class="stat-val" style="color:var(--red)">${pend}</div></div><div class="stat-card"><div class="stat-label">預期總營收</div><div class="stat-val" style="font-size:13px">$${privates.reduce((s,p)=>s+(p.price||0),0).toLocaleString()}</div></div></div>${!privates.length?'<div class="empty">無資料</div>':`<div class="card"><table class="xtable"><thead><tr><th>團名</th><th>出發</th><th>結束</th><th>人數</th><th>報價</th><th>狀態</th><th>操作</th></tr></thead><tbody>${privates.map(p=>{ const st=getPrivStatus(p); return`<tr><td style="font-weight:600">${p.name}</td><td>${p.start||'-'}</td><td>${p.end||'-'}</td><td style="text-align:center">${p.pax||1}</td><td style="font-weight:600">$${(p.price||0).toLocaleString()}</td><td><span class="badge ${st.cls}">${st.label}</span></td><td><button class="btn btn-sm" onclick="openPriv('${p.id}')"><i class="ti ti-edit"></i></button></td></tr>`; }).join('')}</tbody></table></div>`}`;}

function openPriv(id=''){eIds.priv=id||null;const p=id?privates.find(x=>x.id===id):null;document.getElementById('mp-title').textContent=id?'編輯包車團':'新增包車團';document.getElementById('btn-del-priv').style.display=id?'inline-flex':'none';document.getElementById('pf-name').value=p?.name||'';document.getElementById('pf-type').value=p?.type||'car+hotel';document.getElementById('pf-start').value=p?.start||'';document.getElementById('pf-end').value=p?.end||'';document.getElementById('pf-days').value=p?.days?p.days+'天':'';document.getElementById('pf-pax').value=p?.pax||1;document.getElementById('pf-cars').value=p?.cars||1;document.getElementById('pf-cartype').value=p?.cartype||'';document.getElementById('pf-price').value=p?.price||'';document.getElementById('pf-dep').value=p?.deposit||'';document.getElementById('pf-nights').value=p?.hotelNights||0;document.getElementById('pf-ins').value=p?.insCost||0;document.getElementById('pf-phone').value=p?.phone||'';document.getElementById('pf-contact').value=p?.contact||'';document.getElementById('pf-note').value=p?.note||'';document.getElementById('pf-depaid').checked=!!p?.depositPaid;document.getElementById('pf-balpaid').checked=!!p?.balancePaid;const hs=document.getElementById('pf-hotel');hs.innerHTML='<option value="">— 選擇 —</option>'+hotels.map(h=>`<option value="${h.id}"${h.id===p?.hotelId?' selected':''}>${h.name}${h.area?' ('+h.area+')':''}</option>`).join('');nightlyHotels=p?.nightlyHotels||[];document.getElementById('pf-cost-sum').innerHTML='';togglePriv();renderNightlyPicker();om('priv');}
function calcPrivDays(){const s=document.getElementById('pf-start').value,e=document.getElementById('pf-end').value;const days=calcDays(s,e);document.getElementById('pf-days').value=days?days+'天':'';}
function togglePriv(){document.getElementById('pf-hotel-sec').style.display=document.getElementById('pf-type').value==='car+hotel'?'block':'none';}
function togglePrivIns(){const chk=document.getElementById('pf-ins-chk')?.checked;}
function renderNightlyPicker(){const nights=parseInt(document.getElementById('pf-nights').value)||0;const el=document.getElementById('pf-nightly-picker');if(!nights){el.innerHTML='';document.getElementById('pf-hotel-cost').textContent='';return;}el.innerHTML='';}
function getHotelRoomRate(hotel,dateStr,roomType){if(!hotel)return 0;const isWeekend=isHol(dateStr);if(roomType==='r2')return isWeekend?(hotel.r2wk||hotel.r2||0):(hotel.r2||0);if(roomType==='r3')return isWeekend?(hotel.r3wk||hotel.r3||0):(hotel.r3||0);return 0;}
function getNightlyHotelCost(){return 0;}
async function savePriv(){const name=document.getElementById('pf-name').value.trim(),start=document.getElementById('pf-start').value,end=document.getElementById('pf-end').value;if(!name||!start||!end)return alert('請填寫團名、出發日與結束日');setSS('syncing','儲存中…');const days=calcDays(start,end);const data={name,type:document.getElementById('pf-type').value,start,end,days,pax:parseInt(document.getElementById('pf-pax').value)||1,cars:parseInt(document.getElementById('pf-cars').value)||1,cartype:document.getElementById('pf-cartype').value||'',price:parseInt(document.getElementById('pf-price').value)||0,deposit:parseInt(document.getElementById('pf-dep').value)||0,hotelNights:parseInt(document.getElementById('pf-nights').value)||0,insCost:parseInt(document.getElementById('pf-ins').value)||0,phone:document.getElementById('pf-phone').value,contact:document.getElementById('pf-contact').value,note:document.getElementById('pf-note').value,depositPaid:document.getElementById('pf-depaid').checked,balancePaid:document.getElementById('pf-balpaid').checked,nightlyHotels};if(eIds.priv)await db.collection('privates').doc(eIds.priv).update(data);else await db.collection('privates').doc(uid()).set(data);setSS('ok','儲存成功 ✓');}
async function delPriv(){if(!confirm('確定刪除？'))return;await db.collection('privates').doc(eIds.priv).delete();cm('priv');}

// 在頁面載入時初始化
window.addEventListener('load',()=>{initListeners();});
</script>
